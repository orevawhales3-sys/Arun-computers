<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 44" fill="none">
  <defs>
    <linearGradient id="lg1" x1="0" y1="0" x2="56" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="lgA" x1="0" y1="0" x2="20" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="lgC" x1="28" y1="4" x2="50" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Laptop screen body -->
  <rect x="3" y="2" width="50" height="32" rx="3.5" stroke="url(#lg1)" stroke-width="1.8" fill="none"/>

  <!-- Screen inner dark area -->
  <rect x="5.5" y="4.5" width="45" height="27" rx="2" fill="#0F0A1F" opacity="0.7"/>

  <!-- "A" letter -->
  <path d="M14 27 L21 7 L28 27 M16.5 21 L25.5 21" stroke="url(#lgA)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>

  <!-- "C" letter -->
  <path d="M42 12 C38 10 30 11 30 18 C30 25 38 27 42 25" stroke="url(#lgC)" stroke-width="2.6" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Laptop base/hinge area -->
  <path d="M1 36 L7 34 L49 34 L55 36" stroke="url(#lg1)" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- Keyboard base -->
  <path d="M1 36 C0 38 0 42 2 42 L54 42 C56 42 56 38 55 36 Z" fill="url(#lg1)" opacity="0.18"/>

  <!-- Touchpad notch -->
  <rect x="23" y="34" width="10" height="1.5" rx="0.75" fill="url(#lg1)" opacity="0.5"/>
</svg>
