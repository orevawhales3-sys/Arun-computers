services:
  - type: web
    name: arun-computers
    env: static
    branch: main
    buildCommand: npm install -g pnpm@9 && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/arun-computers run build
    staticPublishPath: ./artifacts/arun-computers/dist/public
    envVars:
      - key: BASE_PATH
        value: /
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
